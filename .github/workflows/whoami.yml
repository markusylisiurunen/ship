name: deploy whoami

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup go
        uses: actions/setup-go@v5

      - name: install ship
        run: GOPROXY=direct go install github.com/markusylisiurunen/ship@main

      - name: ship whoami
        run: ship --name whoami --version $(git rev-parse --short HEAD) --host ${{ secrets.WHOAMI_HOST }} --password ${{ secrets.WHOAMI_PASSWORD }}
        working-directory: ./whoami
